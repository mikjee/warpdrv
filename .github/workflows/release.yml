name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0-alpha). Leave blank to use release.json version.'
        required: false
        type: string

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/desktop/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Install npm dependencies
        run: npm install

      - name: Run release build
        run: ./release.sh deb appimage

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(node -p "require('./release.json').version")
            echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          cp packages/desktop/target/release/bundle/deb/*.deb release-artifacts/ 2>/dev/null || true
          cp packages/desktop/target/release/bundle/appimage/*.AppImage release-artifacts/ 2>/dev/null || true
          ls -lh release-artifacts/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: warpdrv-linux-${{ steps.version.outputs.tag }}
          path: release-artifacts/*
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: warpdrv ${{ steps.version.outputs.tag }}
          draft: true
          prerelease: true
          generate_release_notes: true
          files: release-artifacts/*